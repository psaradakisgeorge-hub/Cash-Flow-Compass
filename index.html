<script type="text/babel" data-presets="react,env">
const { useState, useMemo, useEffect, useRef } = React;

/* ---------------------------------- icon set ---------------------------------- */

/* ---------------------------------- tokens ---------------------------------- */
const T = {
  ink: "#221512", inkSoft: "#5B4A42", parchment: "#F4EFEA", paper: "#FBF8F4",
  burgundy: "#7D141D", burgundyDeep: "#57090F", sage: "#6B7A56", amber: "#B8862E", clay: "#A8493E", line: "#DDD3C7",
};

const CAT_COLORS = {
  Housing: "#7D141D", Utilities: "#8B6F47", Groceries: "#6B7A56", Dining: "#C4A35A",
  Transportation: "#4A5568", Subscriptions: "#94493E", Insurance: "#5A0E15", "Debt Payments": "#3D3128",
  Shopping: "#A8493E", Entertainment: "#B8862E", Healthcare: "#7A8471", "Transfer/Savings": "#9C8064",
  Income: "#6B7A56", "Income (other)": "#8FA37C", Uncategorized: "#B7ADA2", Fitness: "#7C8FA0",
};
const catColor = (c) => CAT_COLORS[c] || "#B7ADA2";

/* ---------------------------------- categorization rules ---------------------------------- */
const RULES = [
  ["Income", ["payroll", "direct deposit", "salary", "paycheck", "adp", "gusto"]],
  ["Housing", ["rent", "mortgage", " hoa ", "landlord", "property mgmt"]],
  ["Utilities", ["electric", "pseg", "jcp&l", "con edison", "water co", "utility", "utilities", "comcast", "xfinity", "internet", "gas company", "verizon", "t-mobile", "tmobile", "at&t", "att.com", "cellular", "wireless", "mint mobile", "visible", "boost mobile", "cricket wireless", "metro pcs", "metropcs", "google fi", "straight talk"]],
  ["Insurance", ["geico", "progressive", "allstate", "state farm", "insurance", "liberty mutual", "plymouth rock", "prudential"]],
  ["Fitness", ["crunch", "planet fitness", "la fitness", "equinox", "orangetheory", "anytime fitness", "gym membership"]],
  ["Debt Payments", ["loan payment", "student loan", "auto loan", "credit card payment", "capital one pmt", "discover pmt", "amex payment", "navient", "sallie mae", "car payment", "applecard", "apple card"]],
  ["Groceries", ["whole foods", "trader joe", "shoprite", "stop & shop", "kroger", "safeway", "aldi", "wegmans", "grocery", "acme markets", "costco"]],
  ["Dining", ["starbucks", "restaurant", "doordash", "uber eats", "ubereats", "grubhub", "chipotle", "mcdonald", "coffee", "cafe", "pizza", "dunkin", "chick-fil-a", "bar tab"]],
  ["Transportation", ["shell", "exxon", "chevron", "uber", "lyft", "gas station", "parking", "nj transit", "ezpass", "e-zpass", "septa", "mta", "sunoco", "bp gas"]],
  ["Subscriptions", ["netflix", "spotify", "hulu", "disney+", "apple.com/bill", "subscription", "hbo max", "youtube premium", "audible"]],
  ["Entertainment", ["amc", "ticketmaster", "steam", "playstation", "xbox", "movie", "regal cinemas", "concert"]],
  ["Healthcare", ["pharmacy", "cvs", "walgreens", "medical", "dental", "copay", "urgent care", "labcorp"]],
  ["Shopping", ["amazon", "target", "walmart", "best buy", "macy's", "tj maxx", "marshalls", "ikea", "etsy"]],
  ["Transfer/Savings", ["transfer to savings", "zelle", "venmo", "internal transfer", "savings deposit", "txr from", "txr to", "daily xfer", "xfer trf"]],
];

function categorize(desc, amount) {
  const d = (desc || "").toLowerCase();
  for (const [cat, kws] of RULES) {
    if (kws.some((k) => d.indexOf(k) !== -1)) return cat;
  }
  return amount > 0 ? "Income (other)" : "Uncategorized";
}
const ALL_CATEGORIES = [...new Set(RULES.map((r) => r[0])), "Income (other)", "Uncategorized"];

// Statement descriptions are usually merchant name buried in processor boilerplate — card network
// prefixes, phone numbers, city/state, and long reference codes. This strips the boilerplate so
// what's left reads like "STARBUCKS" instead of "XX1535 PURCHASE-SIG 06/02 STARBUCKS 800782
// 800-782-7282 WA 00000000 039358". Falls back to the original text if cleaning empties it out.
function cleanMerchantName(raw) {
  let s = raw;
  s = s.replace(/^[A-Z]{0,3}\d{2,6}\s+PURCHASE-?(SIG|PIN)?\s*\d{1,2}\/\d{1,2}\s+/i, "");
  s = s.replace(/^(POS|ACH)\s+(DEBIT|CREDIT|PURCHASE|WITHDRAWAL)?\s*/i, "");
  s = s.replace(/^\d{3,8}\s+/, ""); // a leading reference number some merchants print before their own name
  s = s.replace(/\(?\d{3}\)?[-.\s]\d{3}[-.\s]?\d{4}\b.*$/, ""); // trailing phone number (requires a real separator so it can't false-match an unbroken reference-number digit run) and everything after it
  s = s.replace(/\b[A-Z]{2}\s+\d{5,}\s+\d{3,}\s*$/, ""); // trailing "<STATE> <refcode> <refcode>"
  s = s.replace(/\b[A-Z]{2}\s+\d{5,}\s*$/, "");
  s = s.replace(/\s+\d{5,}\s*$/, ""); // trailing lone long reference number
  const parts = s.trim().split(/\s+/);
  if (parts.length > 1) {
    const last = parts[parts.length - 1];
    if (last.length >= 8 && /\d/.test(last) && /[A-Za-z]/.test(last)) parts.pop(); // trailing alphanumeric ref code
    s = parts.join(" ");
  }
  s = s.replace(/\s+/g, " ").trim();
  return s || raw.trim();
}

/* ---------------------------------- csv parsing helpers ---------------------------------- */
function parseMoney(v) {
  if (v === undefined || v === null || v === "") return 0;
  let s = String(v).trim();
  let neg = false;
  if (s.charAt(0) === "(" && s.charAt(s.length - 1) === ")") { neg = true; s = s.slice(1, -1); }
  s = s.replace(/[$,]/g, "");
  let n = parseFloat(s);
  if (isNaN(n)) return 0;
  if (neg) n = -Math.abs(n);
  return n;
}
function findCol(headers, patterns) {
  const lower = headers.map((h) => h.toLowerCase());
  for (const p of patterns) {
    const idx = lower.findIndex((h) => h.indexOf(p) !== -1);
    if (idx !== -1) return headers[idx];
  }
  return null;
}
if (typeof pdfjsLib !== "undefined") {
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
}

const MONTHS = { jan: 1, feb: 2, mar: 3, apr: 4, may: 5, jun: 6, jul: 7, aug: 8, sep: 9, oct: 10, nov: 11, dec: 12 };

function normalizeStatementDate(str, yearHint) {
  let m = str.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?$/);
  if (m) {
    const mm = m[1].padStart(2, "0"), dd = m[2].padStart(2, "0");
    const yyyy = m[3] ? (m[3].length === 2 ? "20" + m[3] : m[3]) : String(yearHint);
    return `${yyyy}-${mm}-${dd}`;
  }
  m = str.match(/^([A-Za-z]{3,9})\.?\s+(\d{1,2}),?\s*(\d{0,4})$/);
  if (m) {
    const mon = MONTHS[m[1].slice(0, 3).toLowerCase()];
    if (!mon) return null;
    const dd = m[2].padStart(2, "0");
    const yyyy = m[3] && m[3].length === 4 ? m[3] : String(yearHint);
    return `${yyyy}-${String(mon).padStart(2, "0")}-${dd}`;
  }
  return null;
}

// Fallback path: no clear table structure found, so grab "date ... description ... amount" per line as one string.
function parseStatementLine(line, yearHint) {
  const amountMatch = line.match(/([\-\+]?\$?\(?[\d,]+\.\d{2}\)?)\s*$/);
  if (!amountMatch) return null;
  const amountStr = amountMatch[1];
  const beforeAmount = line.slice(0, amountMatch.index).trim();
  const dateMatch =
    beforeAmount.match(/^(\d{1,2}\/\d{1,2}(?:\/\d{2,4})?)\s+(.*)$/) ||
    beforeAmount.match(/^([A-Za-z]{3,9}\.?\s+\d{1,2},?\s*\d{0,4})\s+(.*)$/);
  if (!dateMatch) return null;
  const description = dateMatch[2].trim();
  if (!description || description.length < 2) return null;
  const isoDate = normalizeStatementDate(dateMatch[1], yearHint);
  if (!isoDate) return null;
  const amount = parseMoney(amountStr);
  if (isNaN(amount) || amount === 0) return null;
  return { date: isoDate, description: cleanMerchantName(description), amount, signKnown: false };
}

// Reconstructs each row of the PDF as both a flat text string and a list of positioned text items,
// so downstream logic can either read it as one line (fallback) or bucket items into columns (preferred).
// Extracts every text item with its position, and also builds a joined-text "row" view (used for
// header detection and the fallback line-matching path). Items get a synthetic gy ("global y") that
// increases monotonically top-to-bottom across the WHOLE document, not just within one page — real
// PDF y resets every page, so without this a page-3 item could look "above" a page-1 item.
async function extractPdfRows(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const pageRows = [];
  const allItems = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const pageOffset = (p - 1) * 10000;
    const rows = {};
    content.items.forEach((item) => {
      const gy = pageOffset - item.transform[5];
      const bucketKey = Math.round(gy / 3) * 3;
      const rec = { x: item.transform[4], gy, w: item.width || 0, str: item.str };
      if (!rows[bucketKey]) rows[bucketKey] = [];
      rows[bucketKey].push(rec);
      allItems.push(rec);
    });
    Object.keys(rows).map(Number).sort((a, b) => a - b).forEach((bucketKey) => {
      const items = rows[bucketKey].sort((a, b) => a.x - b.x);
      const text = items.map((r) => r.str).join(" ").replace(/\s+/g, " ").trim();
      if (text) pageRows.push({ gy: bucketKey, items, text });
    });
  }
  allItems.sort((a, b) => a.gy - b.gy);
  return { pageRows, allItems };
}

// Looks for a statement period / billing cycle date to anchor the year, instead of always assuming "this year".
function extractStatementYearHint(lines) {
  const joined = lines.join(" \n ");
  let m = joined.match(/(?:statement|billing)\s*(?:period|cycle)[^\d]{0,25}\d{1,2}\/\d{1,2}\/(\d{2,4})/i);
  if (m) return m[1].length === 2 ? 2000 + parseInt(m[1], 10) : parseInt(m[1], 10);
  m = joined.match(/\d{1,2}\/\d{1,2}\/(\d{4})/);
  if (m) return parseInt(m[1], 10);
  m = joined.match(/\b(20\d{2}|19\d{2})\b/);
  if (m) return parseInt(m[1], 10);
  return new Date().getFullYear();
}

const HEADER_PATTERNS = {
  date: /^(?:trans(?:action)?\s*)?date$|post(?:ed|ing)?\s*date/i,
  description: /^desc(?:ription)?$|payee|^transaction$|merchant|^activity$|^details?$/i,
  withdrawal: /withdrawal|^debit$|^debits$|payment|charge/i,
  deposit: /deposit|^credit$|^credits$/i,
  amount: /^amount$/i,
  balance: /balance/i,
};
// Page-furniture text that isn't caught by HEADER_PATTERNS but can still drift into a real
// transaction's column range near a page break (continuation labels, footers, document IDs).
const BOILERPLATE_PATTERNS = [
  /^\(continued\)$/i,
  /^account activity\s*\(continued\)$/i,
  /^statement ending/i,
  /^page \d+ of \d+$/i,
  /checking account statements$/i,
  /^\*\s*indicates skipped check number$/i,
];

// Scans the whole document for header-shaped rows (a date-ish label plus an amount-ish label).
// Returns every candidate found — a statement can repeat its header on continuation pages, and all
// of them need to be excluded from the data pool, not just the one used for column positions.
function detectHeaderCandidates(pageRows) {
  const candidates = [];
  for (const row of pageRows) {
    const roles = [];
    row.items.forEach((item) => {
      const s = item.str.trim();
      if (!s) return;
      for (const [role, re] of Object.entries(HEADER_PATTERNS)) {
        if (re.test(s)) { roles.push({ role, x: item.x + (item.w || 0) / 2, gy: item.gy }); break; }
      }
    });
    const hasDate = roles.some((r) => r.role === "date");
    const hasAmountLike = roles.some((r) => ["withdrawal", "deposit", "amount"].includes(r.role));
    if (hasDate && hasAmountLike && roles.length >= 2) candidates.push({ row, roles });
  }
  return candidates;
}
// A real transaction table almost always has separate debit/withdrawal AND credit/deposit columns,
// while a small summary box (e.g. "Date / Description / Amount") only has one generic amount column.
// Preferring the richer header avoids locking onto a summary box that precedes the real table.
function pickBestHeader(candidates) {
  if (candidates.length === 0) return null;
  const score = (c) => (c.roles.some((r) => r.role === "withdrawal") ? 2 : 0) + (c.roles.some((r) => r.role === "deposit") ? 2 : 0) + c.roles.length;
  return candidates.slice().sort((a, b) => score(b) - score(a))[0]; // stable sort — ties keep first (earliest) occurrence
}

function buildColumnBoundaries(roles) {
  const sorted = roles.slice().sort((a, b) => a.x - b.x);
  return sorted.map((r, i) => ({
    role: r.role,
    minX: i === 0 ? -Infinity : (sorted[i - 1].x + r.x) / 2,
    maxX: i === sorted.length - 1 ? Infinity : (r.x + sorted[i + 1].x) / 2,
  }));
}

const AMOUNT_LIKE_ROLES = ["withdrawal", "deposit", "amount", "balance"];
const isNumericToken = (s) => /^\(?\$?[\d,]+\.\d{2}\)?$/.test(s.trim());
function moneyOrNull(str) {
  if (!str) return null;
  const n = parseMoney(str);
  return isNaN(n) || n === 0 ? null : n;
}

// The core fix: group every item by proximity to its NEAREST transaction-date item, rather than by
// which same-line bucket it happened to land in. A wrapped description's lines can print above,
// below, or straddling its own date/amount line — same-line bucketing can't reunite those reliably,
// but "closest date anchor" handles all three cases the same way. MAX_SPAN keeps a transaction's
// window from stretching across an entire boilerplate-only page when nothing else is nearby.
function groupItemsByDateAnchor(items, dateBound, yearHint) {
  const MAX_SPAN = 100;
  const anchors = [];
  items.forEach((item) => {
    const center = item.x + (item.w || 0) / 2;
    if (center >= dateBound.minX && center < dateBound.maxX) {
      const d = normalizeStatementDate(item.str.trim(), yearHint);
      if (d) anchors.push({ gy: item.gy, isoDate: d });
    }
  });
  anchors.sort((a, b) => a.gy - b.gy);
  const bounds = anchors.map((a, i) => {
    const prevMid = i === 0 ? -Infinity : (anchors[i - 1].gy + a.gy) / 2;
    const nextMid = i === anchors.length - 1 ? Infinity : (a.gy + anchors[i + 1].gy) / 2;
    return { isoDate: a.isoDate, gyMin: Math.max(prevMid, a.gy - MAX_SPAN), gyMax: Math.min(nextMid, a.gy + MAX_SPAN) };
  });
  const groups = bounds.map((b) => ({ isoDate: b.isoDate, items: [] }));
  items.forEach((item) => {
    const idx = bounds.findIndex((b) => item.gy >= b.gyMin && item.gy < b.gyMax);
    if (idx !== -1) groups[idx].items.push(item);
  });
  return groups;
}

function bucketGroupByColumn(group, bounds) {
  const byRole = {};
  group.items.slice().sort((a, b) => a.gy - b.gy || a.x - b.x).forEach((item) => {
    const center = item.x + (item.w || 0) / 2;
    const b = bounds.find((bd) => center >= bd.minX && center < bd.maxX);
    if (!b) return;
    const s = item.str.trim();
    if (!s) return;
    // Numeric columns only accept text that actually looks like a dollar amount — stray boilerplate
    // that happens to overlap a column's x-range gets ignored instead of corrupting the amount
    // (e.g. a page-continuation label landing in the Debits column would otherwise turn "$22.39"
    // into the unparseable string "(continued) $22.39" and silently drop the whole transaction).
    if (AMOUNT_LIKE_ROLES.includes(b.role) && !isNumericToken(s)) return;
    byRole[b.role] = (byRole[b.role] ? byRole[b.role] + " " : "") + s;
  });
  return byRole;
}

const BEGIN_BALANCE_MARKER = /\b(beginning|opening|previous)\s+balance\b/i;
const END_BALANCE_MARKER = /\b(ending|closing|new|total)\s+balance\b/i;

function parseAnchoredTransactions(dataItems, bounds, yearHint) {
  const dateBound = bounds.find((b) => b.role === "date");
  const groups = groupItemsByDateAnchor(dataItems, dateBound, yearHint);
  const results = [];
  for (const g of groups) {
    const byRole = bucketGroupByColumn(g, bounds);
    const descText = (byRole.description || "").trim();
    if (!descText) continue;
    if (BEGIN_BALANCE_MARKER.test(descText)) continue; // skip, more real transactions follow
    if (END_BALANCE_MARKER.test(descText)) break; // stop entirely — everything after is a different table
    let amount = null, signKnown = false;
    if (moneyOrNull(byRole.withdrawal) !== null) { amount = -Math.abs(moneyOrNull(byRole.withdrawal)); signKnown = true; }
    else if (moneyOrNull(byRole.deposit) !== null) { amount = Math.abs(moneyOrNull(byRole.deposit)); signKnown = true; }
    else if (moneyOrNull(byRole.amount) !== null) { amount = moneyOrNull(byRole.amount); signKnown = false; }
    if (amount === null) continue;
    results.push({ date: g.isoDate, description: cleanMerchantName(descText), amount, signKnown });
  }
  return results;
}

// Main entry point: tries column-aware anchor-based table parsing first (higher confidence), falls
// back to whole-line regex matching if no table header is found. Returns staged rows for user
// review — nothing is committed as a real transaction until the person confirms it.
async function parsePdfToStagedRows(file, isCC) {
  const { pageRows, allItems } = await extractPdfRows(file);
  const allLines = pageRows.map((r) => r.text);
  const yearHint = extractStatementYearHint(allLines);
  const candidates = detectHeaderCandidates(pageRows);
  const header = pickBestHeader(candidates);

  let parsed = [];
  let mode = "fallback";
  if (header) {
    const bounds = buildColumnBoundaries(header.roles);
    const headerGy = Math.max(...header.roles.map((r) => r.gy));
    const headerItemSet = new Set();
    candidates.forEach((c) => c.row.items.forEach((it) => headerItemSet.add(it)));
    const dataItems = allItems.filter((it) => it.gy > headerGy && !headerItemSet.has(it) && !BOILERPLATE_PATTERNS.some((re) => re.test(it.str.trim())));
    parsed = parseAnchoredTransactions(dataItems, bounds, yearHint);
    if (parsed.length > 0) mode = "columns";
  }
  if (mode === "fallback") {
    parsed = [];
    allLines.forEach((line) => {
      const p = parseStatementLine(line, yearHint);
      if (p) parsed.push({ ...p, rawLine: line });
    });
  }

  const rows = parsed.map((p) => {
    let amt = p.amount;
    if (isCC && !p.signKnown) amt = -amt;
    return { id: uid(), date: p.date, description: p.description, amount: amt, category: categorize(p.description, amt), include: true, rawLine: p.rawLine };
  });
  let skippedLines = [];
  if (mode === "fallback") {
    const parsedLineSet = new Set(parsed.map((p) => p.rawLine));
    skippedLines = allLines.filter((l) => !parsedLineSet.has(l));
  }
  return { rows, skippedLines, mode, totalLines: allLines.length, yearHint };
}


function uid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
    const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

/* ---------------------------------- debt simulation ---------------------------------- */
function simulateDebtPayoff(debts, extraMonthly, method) {
  let pool = debts.map((d) => ({ ...d, balance: d.balance }));
  if (pool.length === 0 || pool.every((d) => d.balance <= 0)) return { months: 0, totalInterest: 0, order: [] };
  const order = [];
  let months = 0, totalInterest = 0;
  const maxMonths = 600;
  while (pool.some((d) => d.balance > 0.01) && months < maxMonths) {
    months++;
    pool.forEach((d) => {
      if (d.balance > 0) {
        const interest = (d.balance * (d.apr / 100)) / 12;
        totalInterest += interest;
        d.balance += interest;
      }
    });
    pool.forEach((d) => {
      if (d.balance > 0) {
        const pay = Math.min(d.minPayment, d.balance);
        d.balance -= pay;
      }
    });
    let extra = extraMonthly;
    const active = pool.filter((d) => d.balance > 0.01);
    active.sort((a, b) => (method === "avalanche" ? b.apr - a.apr : a.balance - b.balance));
    for (const d of active) {
      if (extra <= 0) break;
      const pay = Math.min(extra, d.balance);
      d.balance -= pay;
      extra -= pay;
      if (d.balance <= 0.01 && order.indexOf(d.name) === -1) order.push(d.name);
    }
  }
  return { months, totalInterest, order };
}

function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(" ");
  let line = "", lines = [];
  words.forEach((w) => {
    const test = line ? line + " " + w : w;
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = w; }
    else line = test;
  });
  if (line) lines.push(line);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineHeight));
  return lines.length;
}

function downloadResultCard(archetype) {
  const size = 1080;
  const canvas = document.createElement("canvas");
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = T.parchment; ctx.fillRect(0, 0, size, size);
  ctx.strokeStyle = T.burgundy; ctx.lineWidth = 6; ctx.strokeRect(34, 34, size - 68, size - 68);

  const cx = size / 2, cy = 300, r = 110;
  const spokeColors = [T.burgundy, T.sage, T.amber, T.clay];
  for (let i = 0; i < 8; i++) {
    const ang = (Math.PI * 2 / 8) * i;
    ctx.strokeStyle = spokeColors[i % spokeColors.length];
    ctx.lineWidth = i % 2 === 0 ? 4 : 2;
    const rr = i % 2 === 0 ? r * 0.78 : r * 0.52;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(ang) * rr, cy + Math.sin(ang) * rr); ctx.stroke();
  }
  ctx.strokeStyle = T.burgundy; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = T.burgundy; ctx.beginPath(); ctx.arc(cx, cy, 9, 0, Math.PI * 2); ctx.fill();

  ctx.textAlign = "center";
  ctx.fillStyle = T.burgundy;
  ctx.font = "600 24px Inter, sans-serif";
  ctx.fillText("C A S H F L O W   C O M P A S S", cx, 478);

  ctx.fillStyle = T.ink;
  ctx.font = "600 66px Fraunces, Georgia, serif";
  ctx.fillText(archetype.name, cx, 580);

  ctx.fillStyle = T.inkSoft;
  ctx.font = "italic 28px Inter, sans-serif";
  wrapCanvasText(ctx, archetype.tagline, cx, 645, 800, 36);

  ctx.fillStyle = T.inkSoft;
  ctx.font = "500 21px Inter, sans-serif";
  ctx.fillText("Find your money personality", cx, size - 92);

  ctx.fillText(window.location.host || "your money, understood", cx, size - 58);

  canvas.toBlob((blob) => {

    link.href = url;
    link.download = `money-personality-${archetype.name.replace(/\s+/g, "-").toLowerCase()}.png`;

    URL.revokeObjectURL(url);
  });
}

function DonutChart({ data, size = 210, thickness = 30 }) {
  const total = data.reduce((s, d) => s + d.monthly, 0) || 1;
  const radius = (size - thickness) / 2;
  const circumference = 2 * Math.PI * radius;
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <g transform={`translate(${size / 2},${size / 2}) rotate(-90)`}>
        <circle r={radius} fill="none" stroke="#EFE8DF" strokeWidth={thickness} />
        {data.map((d, i) => {
          const frac = d.monthly / total;
          const dash = frac * circumference;
          const el = (
            <circle key={i} r={radius} fill="none" stroke={catColor(d.category)} strokeWidth={thickness}
              strokeDasharray={`${dash} ${circumference - dash}`} strokeDashoffset={-offset} />
          );
          offset += dash;
          return el;
        })}
      </g>
    </svg>
  );
}

function App() {
  const [tab, setTab] = useState("upload");
  const [accounts, setAccounts] = useState([]);
  const [transactions, setTransactions] = useState([]);
  const [debts, setDebts] = useState([]);
  const [efundBalance, setEfundBalance] = useState(0);
  const [quizAnswers, setQuizAnswers] = useState({});
  const [quizStep, setQuizStep] = useState(0);
  const fileInputRef = useRef(null);
  const [pendingCC, setPendingCC] = useState(false);
  const [notices, setNotices] = useState([]);
  const [importQueue, setImportQueue] = useState([]);
  const [disclaimerAcked, setDisclaimerAcked] = useState(false);

  const handleFiles = (files, isCC) => {
    Array.from(files).forEach((file) => {
      const isPdf = file.name.toLowerCase().endsWith(".pdf") || file.type === "application/pdf";
      if (isPdf) {
        parsePdfToStagedRows(file, isCC)
          .then(({ rows, skippedLines, mode, totalLines, yearHint }) => {
            setImportQueue((prev) => [...prev, { id: uid(), fileName: file.name, isCC, rows, skippedLines, mode, totalLines, yearHint }]);
          })
          .catch(() => {
            setNotices((prev) => [...prev, { id: uid(), fileName: file.name, text: `Couldn't read ${file.name} — it may be a scanned/image-based PDF, which this tool can't extract text from without OCR.` }]);
          });
        return;
      }
      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: (res) => {
          const headers = res.meta.fields || [];
          const dateCol = findCol(headers, ["date"]);
          const descCol = findCol(headers, ["description", "payee", "merchant", "name"]);
          const amountCol = findCol(headers, ["amount"]);
          const debitCol = findCol(headers, ["debit"]);
          const creditCol = findCol(headers, ["credit"]);
          const accountId = uid();
          const newTx = res.data.map((row) => {
            let amt = 0;
            if (amountCol) amt = parseMoney(row[amountCol]);
            else if (debitCol || creditCol) amt = parseMoney(row[creditCol]) - parseMoney(row[debitCol]);
            if (isCC) amt = -amt;
            const desc = descCol ? row[descCol] : Object.values(row).join(" ");
            return {
              id: uid(), accountId,
              date: dateCol ? row[dateCol] : "",
              description: desc || "(no description)",
              amount: amt,
              category: categorize(desc, amt),
            };
          }).filter((t) => t.description && !isNaN(t.amount) && t.amount !== 0);
          setAccounts((prev) => [...prev, { id: accountId, name: file.name, isCC, count: newTx.length }]);
          setTransactions((prev) => [...prev, ...newTx]);
        },
      });
    });
  };

  const removeAccount = (id) => {
    setAccounts((prev) => prev.filter((a) => a.id !== id));
    setTransactions((prev) => prev.filter((t) => t.accountId !== id));
  };
  const updateCategory = (id, cat) => {
    setTransactions((prev) => prev.map((t) => (t.id === id ? { ...t, category: cat } : t)));
  };

  const updateImportRow = (rowId, patch) => {
    setImportQueue((prev) => prev.map((imp, i) => i === 0 ? { ...imp, rows: imp.rows.map((r) => r.id === rowId ? { ...r, ...patch } : r) } : imp));
  };
  const confirmImport = () => {
    const imp = importQueue[0];
    if (!imp) return;
    const accountId = uid();
    const included = imp.rows.filter((r) => r.include);
    setAccounts((prev) => [...prev, { id: accountId, name: imp.fileName, isCC: imp.isCC, count: included.length, isPdf: true }]);
    setTransactions((prev) => [...prev, ...included.map((r) => ({ id: r.id, accountId, date: r.date, description: r.description, amount: parseFloat(r.amount) || 0, category: r.category }))]);
    setNotices((prev) => [...prev, {
      id: uid(), fileName: imp.fileName,
      text: `Added ${included.length} of ${imp.rows.length} reviewed transaction${imp.rows.length === 1 ? "" : "s"} from ${imp.fileName} (${imp.mode === "columns" ? "table structure detected" : "best-effort line matching used"}).`,
    }]);
    setImportQueue((prev) => prev.slice(1));
  };
  const discardImport = () => setImportQueue((prev) => prev.slice(1));

  const agg = useMemo(() => {
    if (transactions.length === 0) return null;
    const dates = transactions.map((t) => new Date(t.date)).filter((d) => !isNaN(d));
    let monthsSpan = 1;
    if (dates.length > 1) {
      const min = new Date(Math.min.apply(null, dates)), max = new Date(Math.max.apply(null, dates));
      monthsSpan = Math.max(1, Math.round((max - min) / (1000 * 60 * 60 * 24 * 30)));
    }
    const byCat = {};
    let totalIncome = 0;
    transactions.forEach((t) => {
      if (t.category === "Income" || t.category === "Income (other)") {
        if (t.amount > 0) totalIncome += t.amount;
        return;
      }
      const spend = t.amount < 0 ? -t.amount : 0;
      byCat[t.category] = (byCat[t.category] || 0) + spend;
    });
    const monthlyIncome = totalIncome / monthsSpan;
    const catRows = Object.entries(byCat)
      .map(([category, total]) => ({ category, total, monthly: total / monthsSpan, pctOfIncome: monthlyIncome ? (total / monthsSpan) / monthlyIncome : 0 }))
      .sort((a, b) => b.monthly - a.monthly);
    const totalMonthlyExpense = catRows.reduce((s, r) => s + r.monthly, 0);
    return { monthsSpan, monthlyIncome, catRows, totalMonthlyExpense };
  }, [transactions]);

  const guardrails = useMemo(() => {
    if (!agg) return [];
    return agg.catRows.filter((r) => BENCHMARKS[r.category] !== undefined)
      .map((r) => ({ ...r, benchmark: BENCHMARKS[r.category], over: r.pctOfIncome > BENCHMARKS[r.category] }));
  }, [agg]);

  const quizComplete = Object.keys(quizAnswers).length === QUIZ.length;
  const quizResult = useMemo(() => (quizComplete ? scoreQuiz(quizAnswers) : null), [quizAnswers, quizComplete]);

  const strategy = useMemo(() => {
    if (!agg || !quizResult) return null;
    const archetype = ARCHETYPES[quizResult.archetype];
    const minPayTotal = debts.reduce((s, d) => s + d.minPayment, 0);
    const leftover = Math.max(0, agg.monthlyIncome - agg.totalMonthlyExpense - minPayTotal);
    const efundTarget = archetype.efundMonths * agg.totalMonthlyExpense;
    const efundGap = Math.max(0, efundTarget - efundBalance);
    const monthsToFillEfund = leftover > 0 ? Math.ceil(efundGap / leftover) : Infinity;
    const extraForDebtNow = efundGap > 0 ? leftover * archetype.splitDuringEfund.debt : leftover * archetype.splitAfterEfund.debt;
    const extraForSavingsNow = leftover - extraForDebtNow;
    const sprintDebts = debts.filter((d) => (d.includeInSprint !== undefined ? d.includeInSprint : defaultIncludeInSprint(d.type)));
    const excludedDebts = debts.filter((d) => !(d.includeInSprint !== undefined ? d.includeInSprint : defaultIncludeInSprint(d.type)));
    const sim = simulateDebtPayoff(sprintDebts, Math.max(0, extraForDebtNow || (efundGap > 0 ? 0 : leftover * archetype.splitAfterEfund.debt)), archetype.method);
    return { archetype, leftover, efundTarget, efundGap, monthsToFillEfund, extraForDebtNow, extraForSavingsNow, sim, minPayTotal, sprintDebts, excludedDebts };
  }, [agg, quizResult, debts, efundBalance]);

  const fmt = (n) => n.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });

  const NAV = [
    { id: "upload", label: "Accounts", icon: "upload" },
    { id: "transactions", label: "Transactions", icon: "list", disabled: transactions.length === 0 },
    { id: "debts", label: "Debts & Savings", icon: "landmark" },
    { id: "quiz", label: "Money Personality", icon: "brain" },
    { id: "strategy", label: "Your Strategy", icon: "trendingUp", disabled: !agg || !quizComplete },
  ];

  return (
    <>
      {!disclaimerAcked && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(34,21,18,0.6)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div className="card" style={{ maxWidth: 480, background: T.paper }}>
            <div className="display" style={{ fontSize: 20, fontWeight: 600, color: T.burgundy, marginBottom: 12 }}>Before you start</div>
            <div style={{ fontSize: 13.5, lineHeight: 1.7, color: T.ink, marginBottom: 10 }}>
              Cashflow Compass is a self-directed educational tool. It is <strong>not personalized financial, investment, tax, or legal advice</strong>, and using it does not create an advisory relationship. Everything it shows you is based only on the numbers you enter and general rules of thumb — it can't account for your full financial picture.
            </div>
            <div style={{ fontSize: 13.5, lineHeight: 1.7, color: T.ink, marginBottom: 10 }}>
              Please consult a licensed financial professional before making decisions based on anything here.
            </div>
            <div style={{ fontSize: 13.5, lineHeight: 1.7, color: T.ink, marginBottom: 18 }}>
              Nothing you enter is stored or sent anywhere — it lives only in this browser tab.
            </div>
            <button className="btn" onClick={() => setDisclaimerAcked(true)}>I understand — continue</button>
          </div>
        </div>
      )}
    <div className="app-shell" style={{ fontFamily: "'Inter', sans-serif", background: T.parchment, color: T.ink, minHeight: "100vh" }}>
      <div className="sidebar" style={{ borderRight: `1px solid ${T.line}`, padding: "24px 14px", flexShrink: 0 }}>
        <div className="sidebar-title" style={{ padding: "0 6px 24px" }}>
          <div className="display" style={{ fontSize: 20, fontWeight: 600, color: T.burgundy, lineHeight: 1.2 }}>Cashflow<br />Compass</div>
        </div>
        <div className="nav-row">
          {NAV.map((n) => (
            <div key={n.id} className={`navbtn ${tab === n.id ? "active" : ""} ${n.disabled ? "disabled" : ""}`}
              onClick={() => !n.disabled && setTab(n.id)}>
              <Icon name={n.icon} size={16} /> {n.label}
            </div>
          ))}
        </div>
        <div className="sidebar-note" style={{ marginTop: 24, padding: "12px 10px", fontSize: 11.5, color: T.inkSoft, lineHeight: 1.5, borderTop: `1px solid ${T.line}` }}>
          Nothing you enter is stored or transmitted — all data lives only in this browser tab and is gone when you close it.
          <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${T.line}` }}>
            This tool is educational and self-directed. It is not personalized financial, investment, tax, or legal advice. Consult a licensed financial professional before making decisions based on it.
          </div>
        </div>
      </div>

      <div className="main-content" style={{ flex: 1, maxWidth: 980 }}>
        {tab === "upload" && (
          <div>
            <h1 className="display" style={{ fontSize: 26, marginBottom: 4 }}>Connect your accounts</h1>
            <p style={{ color: T.inkSoft, marginBottom: 24, fontSize: 14.5 }}>Upload CSV or PDF statements from your bank or credit card. CSV exports parse cleanly and are recommended when available. PDF statements go through a review step first — you'll see exactly what was extracted before anything is added.</p>

            <div className="card" style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 14 }}>
                <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 14 }}>
                  <input type="checkbox" checked={pendingCC} onChange={(e) => setPendingCC(e.target.checked)} />
                  This file is a credit card statement (charges show as positive numbers)
                </label>
              </div>
              <input ref={fileInputRef} type="file" accept=".csv,.pdf" multiple style={{ display: "none" }}
                onChange={(e) => { handleFiles(e.target.files, pendingCC); e.target.value = ""; }} />
              <button className="btn" onClick={() => fileInputRef.current.click()}><Icon name="upload" size={15} /> Upload CSV or PDF file(s)</button>
              <div style={{ fontSize: 12.5, color: T.inkSoft, marginTop: 10 }}>
                CSV: expects a date column, a description/payee column, and either an Amount column or separate Debit/Credit columns — auto-detected.<br />
                PDF: text is extracted and scanned for lines shaped like "date · description · amount." Scanned/image-based PDFs (no selectable text) can't be read this way.
              </div>
            </div>

            {importQueue.length > 0 && (
              <ImportReviewPanel imp={importQueue[0]} queueLength={importQueue.length}
                onUpdateRow={updateImportRow} onConfirm={confirmImport} onDiscard={discardImport} fmt={fmt} />
            )}

            {notices.length > 0 && (
              <div className="card" style={{ marginBottom: 20, borderColor: T.amber }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                  <Icon name="alertTriangle" size={16} color={T.amber} />
                  <div style={{ fontWeight: 600, fontSize: 13.5 }}>Import notes</div>
                </div>
                {notices.map((n) => (
                  <div key={n.id} style={{ fontSize: 12.5, color: T.inkSoft, lineHeight: 1.6, marginBottom: 8 }}>{n.text}</div>
                ))}
              </div>
            )}

            {accounts.length > 0 && (
              <div className="card">
                <div style={{ fontWeight: 600, marginBottom: 12, fontSize: 14 }}>Uploaded accounts</div>
                {accounts.map((a) => (
                  <div key={a.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: `1px solid ${T.line}` }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <Icon name="fileText" size={15} color={T.inkSoft} />
                      <div>
                        <div style={{ fontSize: 14, fontWeight: 500 }}>{a.name}</div>
                        <div style={{ fontSize: 12, color: T.inkSoft }}>{a.count} transactions · {a.isCC ? "credit card" : "bank account"}{a.isPdf ? " · from PDF, please review" : ""}</div>
                      </div>
                    </div>
                    <Icon name="trash" size={16} color={T.clay} style={{ cursor: "pointer" }} onClick={() => removeAccount(a.id)} />
                  </div>
                ))}
                <button className="btn ghost" style={{ marginTop: 14 }} onClick={() => setTab("transactions")}>
                  Review categorization <Icon name="arrowRight" size={14} />
                </button>
              </div>
            )}
          </div>
        )}

        {tab === "transactions" && agg && (
          <div>
            <h1 className="display" style={{ fontSize: 26, marginBottom: 4 }}>Spending picture</h1>
            <p style={{ color: T.inkSoft, marginBottom: 22, fontSize: 14.5 }}>
              Based on ~{agg.monthsSpan} month{agg.monthsSpan > 1 ? "s" : ""} of data · Avg monthly income <span className="mono">{fmt(agg.monthlyIncome)}</span> · Avg monthly spend <span className="mono">{fmt(agg.totalMonthlyExpense)}</span>
            </p>

            <div className="two-col" style={{ marginBottom: 24 }}>
              <div className="card" style={{ display: "flex", justifyContent: "center", alignItems: "center" }}>
                <DonutChart data={agg.catRows} />
              </div>
              <div className="card">
                <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 10 }}>Top categories</div>
                {agg.catRows.slice(0, 7).map((r) => (
                  <div key={r.category} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13.5 }}>
                      <div style={{ width: 9, height: 9, borderRadius: 2, background: catColor(r.category) }} />
                      {r.category}
                    </div>
                    <div className="mono" style={{ fontSize: 13.5 }}>{fmt(r.monthly)}/mo</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="card">
              <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 10 }}>All transactions ({transactions.length})</div>
              <div className="table-scroll" style={{ maxHeight: 420, overflowY: "auto" }}>
                <table>
                  <thead><tr><th>Date</th><th>Description</th><th style={{ textAlign: "right" }}>Amount</th><th>Category</th></tr></thead>
                  <tbody>
                    {transactions.slice().sort((a, b) => new Date(b.date) - new Date(a.date)).map((t) => (
                      <tr key={t.id}>
                        <td style={{ whiteSpace: "nowrap", color: T.inkSoft }}>{t.date}</td>
                        <td>{t.description}</td>
                        <td className="mono" style={{ textAlign: "right", color: t.amount < 0 ? T.clay : T.sage }}>{fmt(t.amount)}</td>
                        <td>
                          <select value={t.category} onChange={(e) => updateCategory(t.id, e.target.value)}>
                            {ALL_CATEGORIES.map((c) => <option key={c} value={c}>{c}</option>)}
                          </select>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}
        {tab === "transactions" && !agg && (
          <div className="card"><p>Upload at least one account to see your spending picture.</p></div>
        )}

        {tab === "debts" && (
          <DebtsTab debts={debts} setDebts={setDebts} efundBalance={efundBalance} setEfundBalance={setEfundBalance} fmt={fmt} />
        )}

        {tab === "quiz" && (
          <QuizTab quizAnswers={quizAnswers} setQuizAnswers={setQuizAnswers} quizStep={quizStep} setQuizStep={setQuizStep}
            quizComplete={quizComplete} quizResult={quizResult} setTab={setTab} agg={agg} />
        )}

        {tab === "strategy" && agg && quizResult && strategy && (
          <StrategyTab agg={agg} strategy={strategy} guardrails={guardrails} debts={debts} efundBalance={efundBalance} fmt={fmt} />
        )}
      </div>
    </div>
    </>
  );
}

function ImportReviewPanel({ imp, queueLength, onUpdateRow, onConfirm, onDiscard, fmt }) {
  const includedCount = imp.rows.filter((r) => r.include).length;
  return (
    <div className="card" style={{ marginBottom: 20, borderColor: T.burgundy }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 10, marginBottom: 10 }}>
        <div>
          <div style={{ fontWeight: 600, fontSize: 14.5 }}>Review extracted transactions — {imp.fileName}</div>
          <div style={{ fontSize: 12.5, color: T.inkSoft, marginTop: 3 }}>
            {imp.mode === "columns"
              ? "A structured transaction table was detected — parsed by column, higher confidence."
              : "No clear table structure found — used best-effort line matching, please check closely."}
            {" "}Assumed year: <span className="mono">{imp.yearHint}</span> from statement text.
            {queueLength > 1 && ` · ${queueLength - 1} more file${queueLength - 1 === 1 ? "" : "s"} waiting after this one.`}
          </div>
        </div>
      </div>

      {imp.rows.length === 0 ? (
        <div style={{ fontSize: 13.5, color: T.inkSoft, marginBottom: 12 }}>
          Couldn't confidently extract any transactions from this file. A CSV export will work far more reliably than this PDF's layout.
        </div>
      ) : (
        <div className="table-scroll" style={{ maxHeight: 340, overflowY: "auto", marginBottom: 12 }}>
          <table>
            <thead><tr><th></th><th>Date</th><th>Description</th><th style={{ textAlign: "right" }}>Amount</th><th>Category</th></tr></thead>
            <tbody>
              {imp.rows.map((r) => (
                <tr key={r.id} style={{ opacity: r.include ? 1 : 0.45 }}>
                  <td><input type="checkbox" checked={r.include} onChange={(e) => onUpdateRow(r.id, { include: e.target.checked })} /></td>
                  <td><input type="text" value={r.date} onChange={(e) => onUpdateRow(r.id, { date: e.target.value })} style={{ width: 100 }} /></td>
                  <td><input type="text" value={r.description} onChange={(e) => onUpdateRow(r.id, { description: e.target.value })} style={{ width: "100%", minWidth: 160 }} /></td>
                  <td><input type="number" value={r.amount} onChange={(e) => onUpdateRow(r.id, { amount: e.target.value })} style={{ width: 90, textAlign: "right" }} /></td>
                  <td>
                    <select value={r.category} onChange={(e) => onUpdateRow(r.id, { category: e.target.value })}>
                      {ALL_CATEGORIES.map((c) => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {imp.skippedLines.length > 0 && (
        <details style={{ marginBottom: 14 }}>
          <summary style={{ fontSize: 12.5, color: T.inkSoft, cursor: "pointer" }}>{imp.skippedLines.length} line{imp.skippedLines.length === 1 ? "" : "s"} on the page weren't recognized as transactions (headers, totals, etc.) — view raw text</summary>
          <div style={{ maxHeight: 140, overflowY: "auto", fontSize: 11.5, color: T.inkSoft, marginTop: 8, fontFamily: "monospace", lineHeight: 1.6 }}>
            {imp.skippedLines.slice(0, 60).map((l, i) => <div key={i}>{l}</div>)}
            {imp.skippedLines.length > 60 && <div>…and {imp.skippedLines.length - 60} more</div>}
          </div>
        </details>
      )}

      <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
        <button className="btn" onClick={onConfirm} disabled={includedCount === 0}><Icon name="check" size={15} /> Add {includedCount} transaction{includedCount === 1 ? "" : "s"}</button>
        <button className="btn ghost" onClick={onDiscard}>Discard this file</button>
      </div>
    </div>
  );
}

function DebtsTab({ debts, setDebts, efundBalance, setEfundBalance, fmt }) {
  const [form, setForm] = useState({ name: "", type: DEBT_TYPES[0].value, balance: "", apr: "", minPayment: "", includeInSprint: true });
  const setType = (type) => setForm((f) => ({ ...f, type, includeInSprint: defaultIncludeInSprint(type) }));
  const add = () => {
    if (!form.name || !form.balance) return;
    setDebts((prev) => [...prev, {
      id: uid(), name: form.name, type: form.type, includeInSprint: form.includeInSprint,
      balance: parseFloat(form.balance) || 0, apr: parseFloat(form.apr) || 0, minPayment: parseFloat(form.minPayment) || 0,
    }]);
    setForm({ name: "", type: DEBT_TYPES[0].value, balance: "", apr: "", minPayment: "", includeInSprint: true });
  };
  return (
    <div>
      <h1 className="display" style={{ fontSize: 26, marginBottom: 4 }}>Debts & savings</h1>
      <p style={{ color: "#5B4A42", marginBottom: 22, fontSize: 14.5 }}>Statements don't tell us balances or interest rates — add those here so the strategy engine can build a real payoff plan.</p>

      <div className="card" style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 12 }}>Current emergency savings</div>
        <input type="number" placeholder="0" value={efundBalance || ""} onChange={(e) => setEfundBalance(parseFloat(e.target.value) || 0)} style={{ width: 160 }} />
      </div>

      <div className="card" style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 12 }}>Add a debt</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 12, alignItems: "center" }}>
          <input type="text" placeholder="Name (e.g. Discover card)" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} style={{ width: 200 }} />
          <select value={form.type} onChange={(e) => setType(e.target.value)} style={{ width: 160 }}>
            {DEBT_TYPES.map((t) => <option key={t.value} value={t.value}>{t.value}</option>)}
          </select>
          <input type="number" placeholder="Balance $" value={form.balance} onChange={(e) => setForm({ ...form, balance: e.target.value })} style={{ width: 120 }} />
          <input type="number" placeholder="APR %" value={form.apr} onChange={(e) => setForm({ ...form, apr: e.target.value })} style={{ width: 100 }} />
          <input type="number" placeholder="Min payment $" value={form.minPayment} onChange={(e) => setForm({ ...form, minPayment: e.target.value })} style={{ width: 130 }} />
          <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13 }}>
            <input type="checkbox" checked={form.includeInSprint} onChange={(e) => setForm({ ...form, includeInSprint: e.target.checked })} />
            Include in payoff sprint
          </label>
        </div>
        {DEBT_NUDGES[form.type] && (
          <div style={{ fontSize: 12.5, color: "#5B4A42", fontStyle: "italic", marginBottom: 12, maxWidth: 620, lineHeight: 1.5 }}>{DEBT_NUDGES[form.type]}</div>
        )}
        <button className="btn" onClick={add}><Icon name="plusCircle" size={15} /> Add debt</button>
      </div>

      {debts.length > 0 && (
        <div className="card">
          <table>
            <thead><tr><th>Debt</th><th>Type</th><th>Balance</th><th>APR</th><th>Min payment</th><th>In sprint</th><th></th></tr></thead>
            <tbody>
              {debts.map((d) => {
                const included = d.includeInSprint !== undefined ? d.includeInSprint : defaultIncludeInSprint(d.type);
                return (
                  <React.Fragment key={d.id}>
                    <tr>
                      <td>{d.name}</td>
                      <td>
                        <select value={d.type || "Other"} onChange={(e) => setDebts((prev) => prev.map((x) => x.id === d.id ? { ...x, type: e.target.value } : x))}
                          style={{ borderColor: debtTypeColor(d.type || "Other"), color: debtTypeColor(d.type || "Other"), fontWeight: 600, fontSize: 12.5 }}>
                          {DEBT_TYPES.map((t) => <option key={t.value} value={t.value}>{t.value}</option>)}
                        </select>
                      </td>
                      <td className="mono">{fmt(d.balance)}</td>
                      <td className="mono">{d.apr}%</td>
                      <td className="mono">{fmt(d.minPayment)}/mo</td>
                      <td>
                        <input type="checkbox" checked={included} onChange={(e) => setDebts((prev) => prev.map((x) => x.id === d.id ? { ...x, includeInSprint: e.target.checked } : x))} />
                      </td>
                      <td><Icon name="trash" size={15} color="#A8493E" style={{ cursor: "pointer" }} onClick={() => setDebts((p) => p.filter((x) => x.id !== d.id))} /></td>
                    </tr>
                    {DEBT_NUDGES[d.type] && (
                      <tr>
                        <td colSpan={7} style={{ fontSize: 12, color: "#5B4A42", fontStyle: "italic", lineHeight: 1.5, paddingTop: 0, paddingBottom: 12 }}>{DEBT_NUDGES[d.type]}</td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
          <div style={{ fontSize: 12, color: "#5B4A42", marginTop: 10 }}>
            Payoff order is calculated on the Strategy tab, based on your money personality (highest-APR-first or smallest-balance-first).
          </div>
        </div>
      )}
    </div>
  );
}

function QuizTab({ quizAnswers, setQuizAnswers, quizStep, setQuizStep, quizComplete, quizResult, setTab, agg }) {
  if (quizComplete && quizResult) {
    const a = ARCHETYPES[quizResult.archetype];
    return (
      <div>
        <h1 className="display" style={{ fontSize: 26, marginBottom: 16 }}>Your money personality</h1>
        <div className="card" style={{ marginBottom: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <Icon name="sparkles" size={18} color="#7D141D" />
            <div className="display" style={{ fontSize: 22, fontWeight: 600, color: "#7D141D" }}>{a.name}</div>
          </div>
          <div style={{ fontSize: 14.5, color: "#5B4A42", marginBottom: 10, fontStyle: "italic" }}>{a.tagline}</div>
          <p style={{ fontSize: 14.5, lineHeight: 1.6 }}>{a.blurb}</p>
        </div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <button className="btn ghost" onClick={() => { setQuizAnswers({}); setQuizStep(0); }}>Retake quiz</button>
          <button className="btn" onClick={() => downloadResultCard(a)}><Icon name="sparkles" size={15} /> Download result card</button>
          {agg && <button className="btn ghost" onClick={() => setTab("strategy")}>See my strategy <Icon name="chevronRight" size={15} /></button>}
        </div>
      </div>
    );
  }

  const q = QUIZ[quizStep];
  return (
    <div>
      <h1 className="display" style={{ fontSize: 26, marginBottom: 4 }}>Money personality assessment</h1>
      <p style={{ color: "#5B4A42", marginBottom: 22, fontSize: 14.5 }}>Question {quizStep + 1} of {QUIZ.length}</p>
      <div className="card" style={{ maxWidth: 620 }}>
        <div style={{ fontSize: 16.5, fontWeight: 500, marginBottom: 18 }}>{q.q}</div>
        {q.opts.map((o, i) => (
          <div key={i} className="quiz-opt" onClick={() => {
            setQuizAnswers((prev) => ({ ...prev, [quizStep]: i }));
            if (quizStep < QUIZ.length - 1) setQuizStep(quizStep + 1);
          }}>
            {o.t}
          </div>
        ))}
      </div>
      {quizStep > 0 && <button className="btn ghost" style={{ marginTop: 14 }} onClick={() => setQuizStep(quizStep - 1)}>Back</button>}
    </div>
  );
}

function StrategyTab({ agg, strategy, guardrails, debts, efundBalance, fmt }) {
  const { archetype, efundTarget, efundGap, monthsToFillEfund, extraForDebtNow, extraForSavingsNow, sim, minPayTotal, sprintDebts, excludedDebts } = strategy;
  const overGuardrails = guardrails.filter((g) => g.over);

  const segments = [
    { label: "Fixed expenses", val: agg.totalMonthlyExpense, color: "#8B6F47" },
    { label: "Debt minimums", val: minPayTotal, color: "#3D3128" },
    { label: "Extra to savings", val: extraForSavingsNow, color: "#6B7A56" },
    { label: "Extra to debt", val: extraForDebtNow, color: "#7D141D" },
  ].filter((s) => s.val > 0.5);
  const totalBar = segments.reduce((s, x) => s + x.val, 0) || 1;

  return (
    <div>
      <div className="no-print" style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 16, flexWrap: "wrap" }}>
        <div>
          <h1 className="display" style={{ fontSize: 26, marginBottom: 4 }}>Your strategy — {archetype.name}</h1>
          <p style={{ color: "#5B4A42", marginBottom: 6, fontSize: 14.5 }}>Built from your spending, your debts, and your money personality.</p>
          <p style={{ color: "#A8493E", marginBottom: 22, fontSize: 12, fontStyle: "italic" }}>This is a self-directed educational estimate, not personalized financial advice. Consult a licensed financial professional before acting on it.</p>
        </div>
        <button className="btn ghost" onClick={() => window.print()}><Icon name="fileText" size={15} /> Download PDF report</button>
      </div>

      <div className="card" style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 12 }}>Where your {fmt(agg.monthlyIncome)}/mo goes</div>
        <div style={{ display: "flex", height: 34, borderRadius: 6, overflow: "hidden", border: "1px solid #DDD3C7" }}>
          {segments.map((s, i) => (
            <div key={i} style={{ width: `${(s.val / totalBar) * 100}%`, background: s.color }} title={`${s.label}: ${fmt(s.val)}`} />
          ))}
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 16, marginTop: 12 }}>
          {segments.map((s, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5 }}>
              <div style={{ width: 9, height: 9, borderRadius: 2, background: s.color }} />
              {s.label}: <span className="mono">{fmt(s.val)}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="two-col" style={{ marginBottom: 20 }}>
        <div className="card">
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <Icon name="piggyBank" size={17} color="#6B7A56" />
            <div style={{ fontWeight: 600, fontSize: 14 }}>Emergency fund</div>
          </div>
          <div style={{ fontSize: 13.5, lineHeight: 1.7 }}>
            Target for your profile: <span className="mono">{fmt(efundTarget)}</span> ({archetype.efundMonths} months of expenses)<br />
            Current: <span className="mono">{fmt(efundBalance)}</span><br />
            {efundGap > 0
              ? <>Gap: <span className="mono">{fmt(efundGap)}</span> — filled in ~{isFinite(monthsToFillEfund) ? monthsToFillEfund : "—"} months at current pace</>
              : <span style={{ color: "#6B7A56" }}>Target met — full leftover cash flow is going to debt.</span>}
          </div>
        </div>
        <div className="card">
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <Icon name="creditCard" size={17} color="#7D141D" />
            <div style={{ fontWeight: 600, fontSize: 14 }}>Debt payoff — {archetype.method === "avalanche" ? "Avalanche (highest APR first)" : "Snowball (smallest balance first)"}</div>
          </div>
          {debts.length === 0 ? (
            <div style={{ fontSize: 13.5, color: "#5B4A42" }}>No debts entered — add them in the Debts & Savings tab.</div>
          ) : (
            <>
              <div style={{ fontSize: 13.5, lineHeight: 1.7, marginBottom: 12 }}>
                Est. time to debt-free (sprint debts): <span className="mono">{sim.months} months</span> (~{(sim.months / 12).toFixed(1)} yrs)<br />
                Est. total interest paid: <span className="mono">{fmt(sim.totalInterest)}</span>
              </div>
              {sprintDebts.length > 0 && (
                <>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#5B4A42", marginBottom: 6, textTransform: "uppercase", letterSpacing: ".04em" }}>Payoff order</div>
                  {sprintDebts.slice().sort((a, b) => (archetype.method === "avalanche" ? b.apr - a.apr : a.balance - b.balance)).map((d, i) => (
                    <div key={d.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", fontSize: 13 }}>
                      <div style={{ width: 18, height: 18, borderRadius: "50%", background: "#F4EFEA", border: "1px solid #DDD3C7", fontSize: 10.5, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{i + 1}</div>
                      <span style={{ fontWeight: 500 }}>{d.name}</span>
                      <span style={{ fontSize: 10.5, fontWeight: 600, color: debtTypeColor(d.type || "Other"), border: `1px solid ${debtTypeColor(d.type || "Other")}`, borderRadius: 10, padding: "1px 7px" }}>{d.type || "Other"}</span>
                      <span className="mono" style={{ marginLeft: "auto", color: "#5B4A42" }}>{fmt(d.balance)} · {d.apr}%</span>
                    </div>
                  ))}
                </>
              )}
              {excludedDebts.length > 0 && (
                <div style={{ marginTop: 16, paddingTop: 12, borderTop: "1px solid #DDD3C7" }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#5B4A42", marginBottom: 6, textTransform: "uppercase", letterSpacing: ".04em" }}>Not included in this sprint</div>
                  {excludedDebts.map((d) => (
                    <div key={d.id} style={{ marginBottom: 10 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13 }}>
                        <span style={{ fontWeight: 500 }}>{d.name}</span>
                        <span style={{ fontSize: 10.5, fontWeight: 600, color: debtTypeColor(d.type || "Other"), border: `1px solid ${debtTypeColor(d.type || "Other")}`, borderRadius: 10, padding: "1px 7px" }}>{d.type || "Other"}</span>
                        <span className="mono" style={{ marginLeft: "auto", color: "#5B4A42" }}>{fmt(d.minPayment)}/mo minimum</span>
                      </div>
                      {DEBT_NUDGES[d.type] && <div style={{ fontSize: 12, color: "#5B4A42", fontStyle: "italic", marginTop: 3, lineHeight: 1.5 }}>{DEBT_NUDGES[d.type]}</div>}
                    </div>
                  ))}
                  <div style={{ fontSize: 12, color: "#5B4A42" }}>These are still paid at their minimum every month — they're just not being targeted with extra payments in this sprint. Toggle them back on in the Debts & Savings tab any time.</div>
                </div>
              )}
            </>
          )}
        </div>
      </div>

      <div className="card">
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
          <Icon name="alertTriangle" size={17} color="#B8862E" />
          <div style={{ fontWeight: 600, fontSize: 14 }}>Spending guardrails</div>
        </div>
        {guardrails.length === 0 && <div style={{ fontSize: 13.5, color: "#5B4A42" }}>Not enough categorized spending to check guardrails yet.</div>}
        {guardrails.map((g) => (
          <div key={g.category} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #DDD3C7", fontSize: 13.5 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              {g.over ? <Icon name="alertTriangle" size={13} color="#A8493E" /> : <Icon name="check" size={13} color="#6B7A56" />}
              {g.category}
            </div>
            <div className="mono" style={{ color: g.over ? "#A8493E" : "#5B4A42" }}>
              {(g.pctOfIncome * 100).toFixed(1)}% of income (benchmark {(g.benchmark * 100).toFixed(0)}%)
            </div>
          </div>
        ))}
        {overGuardrails.length > 0 && (
          <div style={{ marginTop: 12, fontSize: 13, color: "#5B4A42" }}>
            {overGuardrails.length} categor{overGuardrails.length > 1 ? "ies are" : "y is"} running above typical benchmarks — trimming these frees up cash toward your current target faster.
          </div>
        )}
      </div>

      <div id="print-report">
        <h1 style={{ fontFamily: "Fraunces, serif", fontSize: 26, color: "#7D141D", marginBottom: 2 }}>Cashflow Compass — Strategy Report</h1>
        <div style={{ fontSize: 12, color: "#5B4A42", marginBottom: 18 }}>Generated {new Date().toLocaleDateString()}</div>

        <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 18, color: "#221512", marginTop: 20 }}>Money personality: {archetype.name}</h2>
        <div style={{ fontSize: 13, fontStyle: "italic", color: "#5B4A42", marginBottom: 6 }}>{archetype.tagline}</div>
        <div style={{ fontSize: 12.5, lineHeight: 1.6 }}>{archetype.blurb}</div>

        <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 18, color: "#221512", marginTop: 20 }}>Cash flow summary</h2>
        <table style={{ width: "100%", fontSize: 12.5, marginTop: 6 }}>
          <tbody>
            <tr><td style={{ padding: "3px 0" }}>Average monthly income</td><td style={{ textAlign: "right" }}>{fmt(agg.monthlyIncome)}</td></tr>
            <tr><td style={{ padding: "3px 0" }}>Average monthly expenses</td><td style={{ textAlign: "right" }}>{fmt(agg.totalMonthlyExpense)}</td></tr>
            <tr><td style={{ padding: "3px 0" }}>Debt minimum payments</td><td style={{ textAlign: "right" }}>{fmt(minPayTotal)}</td></tr>
            <tr><td style={{ padding: "3px 0" }}>Extra allocated to savings</td><td style={{ textAlign: "right" }}>{fmt(extraForSavingsNow)}</td></tr>
            <tr><td style={{ padding: "3px 0" }}>Extra allocated to debt</td><td style={{ textAlign: "right" }}>{fmt(extraForDebtNow)}</td></tr>
          </tbody>
        </table>

        <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 18, color: "#221512", marginTop: 20 }}>Emergency fund</h2>
        <div style={{ fontSize: 12.5, lineHeight: 1.6 }}>
          Target: {fmt(efundTarget)} ({archetype.efundMonths} months of expenses) · Current: {fmt(efundBalance)}<br />
          {efundGap > 0 ? `Gap: ${fmt(efundGap)}, filled in ~${isFinite(monthsToFillEfund) ? monthsToFillEfund : "—"} months at current pace.` : "Target met."}
        </div>

        {debts.length > 0 && (
          <>
            <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 18, color: "#221512", marginTop: 20 }}>Debt payoff plan ({archetype.method === "avalanche" ? "avalanche" : "snowball"})</h2>
            <div style={{ fontSize: 12.5, marginBottom: 6 }}>Est. time to debt-free: {sim.months} months · Est. total interest paid: {fmt(sim.totalInterest)}</div>
            <table style={{ width: "100%", fontSize: 12.5, borderCollapse: "collapse" }}>
              <thead><tr><th style={{ textAlign: "left", borderBottom: "1px solid #ccc", padding: "3px 0" }}>Debt</th><th style={{ textAlign: "left", borderBottom: "1px solid #ccc" }}>Type</th><th style={{ textAlign: "right", borderBottom: "1px solid #ccc" }}>Balance</th><th style={{ textAlign: "right", borderBottom: "1px solid #ccc" }}>APR</th><th style={{ textAlign: "center", borderBottom: "1px solid #ccc" }}>In sprint</th></tr></thead>
              <tbody>
                {debts.map((d) => {
                  const included = sprintDebts.some((x) => x.id === d.id);
                  return (
                    <tr key={d.id}>
                      <td style={{ padding: "3px 0" }}>{d.name}</td>
                      <td>{d.type || "Other"}</td>
                      <td style={{ textAlign: "right" }}>{fmt(d.balance)}</td>
                      <td style={{ textAlign: "right" }}>{d.apr}%</td>
                      <td style={{ textAlign: "center" }}>{included ? "Yes" : "No"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </>
        )}

        <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 18, color: "#221512", marginTop: 20 }}>Spending guardrails</h2>
        <table style={{ width: "100%", fontSize: 12.5 }}>
          <tbody>
            {guardrails.map((g) => (
              <tr key={g.category}>
                <td style={{ padding: "3px 0" }}>{g.category}{g.over ? " (over benchmark)" : ""}</td>
                <td style={{ textAlign: "right" }}>{(g.pctOfIncome * 100).toFixed(1)}% of income (benchmark {(g.benchmark * 100).toFixed(0)}%)</td>
              </tr>
            ))}
          </tbody>
        </table>

        <div style={{ fontSize: 10.5, color: "#5B4A42", marginTop: 24, borderTop: "1px solid #ccc", paddingTop: 10 }}>
          This report is a self-directed planning tool and does not constitute personalized financial, investment, or tax advice.
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
